appId: com.thinkpod.app
productName: ThinkPod
publish:
  provider: github
  owner: virkillz
  repo: thinkpod
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - node_modules/**/*
  - package.json
extraResources:
  - from: resources/skills
    to: skills
    filter:
      - "**/*"

mac:
  category: public.app-category.productivity
  icon: build/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  identity: "Developer ID Application: Arif Yuliannur (2QW696JV44)"
  target:
    - target: dmg
      arch:
        - arm64
        - x64

afterSign: scripts/notarize.js

win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
        - arm64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

linux:
  icon: build/icon.png
  category: Utility
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
    - target: rpm
      arch:
        - x64
